document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"dc04717b-5bfa-4d1a-a6ce-c04dc6b4bd86\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root{\n  /* base surfaces — near-black, faint green cast */\n  --bg:        oklch(0.15 0.012 158);\n  --bg-2:      oklch(0.18 0.014 158);\n  --surface:   oklch(0.205 0.016 158);\n  --surface-2: oklch(0.235 0.018 158);\n  --line:      oklch(0.30 0.020 158);\n  --line-soft: oklch(0.26 0.016 158);\n\n  /* signal green — truth / integrity */\n  --green:      oklch(0.84 0.19 150);\n  --green-dim:  oklch(0.74 0.16 150);\n  --green-deep: oklch(0.45 0.12 150);\n  --green-glow: oklch(0.84 0.19 150 / 0.18);\n\n  /* alert — used ONLY for caught / flagged states */\n  --flag:      oklch(0.68 0.20 28);\n  --flag-dim:  oklch(0.58 0.17 28);\n\n  /* amber — warning / medium-risk */\n  --amber:     oklch(0.82 0.15 78);\n\n  /* text */\n  --text:      oklch(0.97 0.008 158);\n  --text-mut:  oklch(0.74 0.014 158);\n  --text-dim:  oklch(0.58 0.014 158);\n\n  --maxw: 1200px;\n  --radius: 14px;\n  --radius-sm: 9px;\n\n  --font-display: 'Space Grotesk', sans-serif;\n  --font-body: 'Hanken Grotesk', sans-serif;\n  --font-mono: 'JetBrains Mono', monospace;\n\n  --ease: cubic-bezier(0.22, 1, 0.36, 1);\n}\n\n*{ box-sizing:border-box; margin:0; padding:0; }\n\nhtml{ scroll-behavior:smooth; -webkit-text-size-adjust:100%; }\n\nbody{\n  background:var(--bg);\n  color:var(--text);\n  font-family:var(--font-body);\n  font-size:17px;\n  line-height:1.6;\n  font-weight:400;\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n  overflow-x:hidden;\n}\n\n/* subtle grid texture over the whole page */\nbody::before{\n  content:\"\";\n  position:fixed; inset:0;\n  background-image:\n    linear-gradient(to right, oklch(0.30 0.02 158 / 0.20) 1px, transparent 1px),\n    linear-gradient(to bottom, oklch(0.30 0.02 158 / 0.20) 1px, transparent 1px);\n  background-size:64px 64px;\n  -webkit-mask-image:radial-gradient(ellipse 90% 60% at 50% 0%, #000 0%, transparent 75%);\n          mask-image:radial-gradient(ellipse 90% 60% at 50% 0%, #000 0%, transparent 75%);\n  opacity:0.5;\n  pointer-events:none;\n  z-index:0;\n}\n\nimg{ max-width:100%; display:block; }\na{ color:inherit; text-decoration:none; }\nbutton{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }\n\n::selection{ background:var(--green); color:#06140c; }\n\n/* ----------------------------------------------------------\n   Layout helpers\n   ---------------------------------------------------------- */\n.wrap{ width:100%; max-width:var(--maxw); margin:0 auto; padding:0 32px; position:relative; z-index:1; }\n.section{ padding:104px 0; position:relative; z-index:1; }\n.section--tight{ padding:72px 0; }\n.center{ text-align:center; }\n\n/* ----------------------------------------------------------\n   Type\n   ---------------------------------------------------------- */\nh1,h2,h3,h4{ font-family:var(--font-display); font-weight:600; line-height:1.04; letter-spacing:-0.02em; }\n\n.display{\n  font-size:clamp(2.6rem, 6.2vw, 5.1rem);\n  font-weight:600;\n  line-height:0.98;\n  letter-spacing:-0.035em;\n}\n.h2{ font-size:clamp(2rem, 3.6vw, 3.1rem); letter-spacing:-0.03em; }\n.h3{ font-size:clamp(1.3rem, 1.8vw, 1.65rem); }\n.lead{\n  font-size:clamp(1.05rem, 1.5vw, 1.28rem);\n  color:var(--text-mut);\n  line-height:1.55;\n  max-width:60ch;\n  text-wrap:pretty;\n}\n.muted{ color:var(--text-mut); }\n.dim{ color:var(--text-dim); }\n\n/* eyebrow / kicker */\n.kicker{\n  display:inline-flex; align-items:center; gap:9px;\n  font-family:var(--font-mono);\n  font-size:0.78rem; font-weight:500;\n  letter-spacing:0.16em; text-transform:uppercase;\n  color:var(--green);\n}\n.kicker::before{\n  content:\"\"; width:7px; height:7px; border-radius:2px;\n  background:var(--green);\n  box-shadow:0 0 12px var(--green);\n}\n.kicker--center{ justify-content:center; }\n\n.tx-green{ color:var(--green); }\n.tx-flag{ color:var(--flag); }\n\n/* ----------------------------------------------------------\n   Buttons\n   ---------------------------------------------------------- */\n.btn{\n  display:inline-flex; align-items:center; gap:10px;\n  font-family:var(--font-mono); font-size:0.92rem; font-weight:500;\n  letter-spacing:-0.01em;\n  padding:14px 22px; border-radius:10px;\n  transition:transform .25s var(--ease), background .25s var(--ease), box-shadow .25s var(--ease), border-color .25s var(--ease);\n  white-space:nowrap; cursor:pointer;\n}\n.btn .arw{ transition:transform .3s var(--ease); }\n.btn:hover .arw{ transform:translateX(4px); }\n\n.btn--primary{\n  background:var(--green); color:#06140c; font-weight:600;\n  box-shadow:0 0 0 0 var(--green-glow);\n}\n.btn--primary:hover{ transform:translateY(-2px); box-shadow:0 10px 34px -8px var(--green-glow), 0 0 0 1px var(--green); }\n\n.btn--ghost{\n  background:transparent; color:var(--text);\n  border:1px solid var(--line);\n}\n.btn--ghost:hover{ border-color:var(--green); color:var(--green); transform:translateY(-2px); }\n\n.btn--lg{ padding:17px 28px; font-size:1rem; }\n\n/* ----------------------------------------------------------\n   Header / nav\n   ---------------------------------------------------------- */\n.site-header{\n  position:fixed; top:0; left:0; right:0; z-index:100;\n  transition:background .3s var(--ease), border-color .3s var(--ease), backdrop-filter .3s;\n  border-bottom:1px solid transparent;\n}\n.site-header.scrolled{\n  background:oklch(0.15 0.012 158 / 0.82);\n  backdrop-filter:blur(14px) saturate(1.2);\n  -webkit-backdrop-filter:blur(14px) saturate(1.2);\n  border-bottom:1px solid var(--line-soft);\n}\n.nav{ display:flex; align-items:center; justify-content:space-between; height:72px; }\n.brand{ display:inline-flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:700; font-size:1.32rem; letter-spacing:-0.03em; }\n.brand .dot{\n  width:12px; height:12px; border-radius:3px; background:var(--green);\n  box-shadow:0 0 14px var(--green);\n  position:relative;\n  animation:pulseDot 2.6s var(--ease) infinite;\n}\n@keyframes pulseDot{ 0%,100%{ opacity:1; transform:scale(1);} 50%{ opacity:0.55; transform:scale(0.82);} }\n\n.nav-links{ display:flex; align-items:center; gap:34px; }\n.nav-links a{\n  font-size:0.95rem; color:var(--text-mut); font-weight:500;\n  transition:color .2s; position:relative;\n}\n.nav-links a:hover, .nav-links a.active{ color:var(--text); }\n.nav-links a.active::after{\n  content:\"\"; position:absolute; left:0; right:0; bottom:-6px; height:2px;\n  background:var(--green); border-radius:2px;\n}\n.nav-right{ display:flex; align-items:center; gap:18px; }\n.nav-cta-mobile{ display:none; }\n\n.nav-toggle{ display:none; width:42px; height:42px; border:1px solid var(--line); border-radius:9px; align-items:center; justify-content:center; }\n.nav-toggle span, .nav-toggle span::before, .nav-toggle span::after{\n  content:\"\"; display:block; width:18px; height:2px; background:var(--text); border-radius:2px; position:relative; transition:.25s var(--ease);\n}\n.nav-toggle span::before{ position:absolute; top:-6px; }\n.nav-toggle span::after{ position:absolute; top:6px; }\nbody.nav-open .nav-toggle span{ background:transparent; }\nbody.nav-open .nav-toggle span::before{ top:0; transform:rotate(45deg); }\nbody.nav-open .nav-toggle span::after{ top:0; transform:rotate(-45deg); }\n\n/* ----------------------------------------------------------\n   Cards\n   ---------------------------------------------------------- */\n.card{\n  background:var(--surface);\n  border:1px solid var(--line-soft);\n  border-radius:var(--radius);\n  padding:28px;\n  transition:transform .35s var(--ease), border-color .35s var(--ease), background .35s var(--ease);\n  position:relative;\n}\n.card:hover{ transform:translateY(-4px); border-color:var(--green-deep); }\n\n.card-ico{\n  width:46px; height:46px; border-radius:11px;\n  display:flex; align-items:center; justify-content:center;\n  background:oklch(0.84 0.19 150 / 0.10);\n  border:1px solid oklch(0.84 0.19 150 / 0.25);\n  color:var(--green);\n  margin-bottom:18px;\n}\n.card-ico svg{ width:22px; height:22px; }\n.card h3{ font-size:1.18rem; margin-bottom:9px; }\n.card p{ color:var(--text-mut); font-size:0.97rem; line-height:1.55; }\n\n/* tag */\n.tag{\n  display:inline-flex; align-items:center; gap:7px;\n  font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.06em;\n  text-transform:uppercase; color:var(--text-mut);\n  border:1px solid var(--line); border-radius:999px; padding:5px 12px;\n}\n\n/* ----------------------------------------------------------\n   Reveal animation\n   ---------------------------------------------------------- */\n.reveal{ opacity:0; transform:translateY(22px); transition:opacity .7s var(--ease), transform .7s var(--ease); }\n.reveal.in{ opacity:1; transform:none; }\n.reveal[data-d=\"1\"]{ transition-delay:.08s; }\n.reveal[data-d=\"2\"]{ transition-delay:.16s; }\n.reveal[data-d=\"3\"]{ transition-delay:.24s; }\n.reveal[data-d=\"4\"]{ transition-delay:.32s; }\n\n@media (prefers-reduced-motion: reduce){\n  *{ animation:none !important; transition:none !important; }\n  .reveal{ opacity:1; transform:none; }\n  html{ scroll-behavior:auto; }\n}\n\n/* ----------------------------------------------------------\n   Footer\n   ---------------------------------------------------------- */\n.site-footer{\n  border-top:1px solid var(--line-soft);\n  background:var(--bg-2);\n  padding:72px 0 36px;\n  position:relative; z-index:1;\n}\n.foot-grid{ display:grid; grid-template-columns:1.6fr 1fr 1fr 1fr; gap:40px; }\n.foot-brand .brand{ margin-bottom:16px; }\n.foot-brand p{ color:var(--text-mut); font-size:0.95rem; max-width:30ch; }\n.foot-col h4{ font-family:var(--font-mono); font-size:0.74rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-dim); margin-bottom:18px; font-weight:500; }\n.foot-col a{ display:block; color:var(--text-mut); font-size:0.95rem; padding:6px 0; transition:color .2s, transform .2s; }\n.foot-col a:hover{ color:var(--green); transform:translateX(3px); }\n.foot-bot{ display:flex; align-items:center; justify-content:space-between; margin-top:54px; padding-top:26px; border-top:1px solid var(--line-soft); color:var(--text-dim); font-size:0.85rem; font-family:var(--font-mono); }\n.foot-bot .lights{ display:flex; gap:7px; }\n.foot-bot .lights i{ width:8px; height:8px; border-radius:50%; display:inline-block; }\n\n/* ----------------------------------------------------------\n   Misc shared components\n   ---------------------------------------------------------- */\n.hairline{ height:1px; background:var(--line-soft); border:0; }\n\n/* stat band */\n.stat-num{ font-family:var(--font-display); font-weight:600; font-size:clamp(2.4rem,4vw,3.4rem); color:var(--green); line-height:1; letter-spacing:-0.03em; }\n.stat-lbl{ color:var(--text-mut); font-size:0.96rem; margin-top:10px; }\n\n/* page hero (interior pages) */\n.page-hero{ padding:148px 0 60px; position:relative; }\n.page-hero .display{ max-width:18ch; }\n\n/* breadcrumb */\n.crumb{ font-family:var(--font-mono); font-size:0.8rem; color:var(--text-dim); letter-spacing:0.04em; margin-bottom:22px; }\n.crumb a:hover{ color:var(--green); }\n.crumb span{ color:var(--green); }\n\n/* pill list */\n.checkrow{ display:flex; align-items:flex-start; gap:13px; padding:13px 0; border-bottom:1px solid var(--line-soft); }\n.checkrow:last-child{ border-bottom:0; }\n.checkrow .ck{ flex:none; width:22px; height:22px; border-radius:6px; background:oklch(0.84 0.19 150 / 0.12); color:var(--green); display:flex; align-items:center; justify-content:center; margin-top:2px; }\n.checkrow .ck svg{ width:13px; height:13px; }\n\n/* FAQ */\n.faq-item{ border-bottom:1px solid var(--line-soft); }\n.faq-q{ width:100%; display:flex; align-items:center; justify-content:space-between; gap:20px; padding:24px 0; text-align:left; font-family:var(--font-display); font-size:1.12rem; font-weight:500; color:var(--text); letter-spacing:-0.01em; }\n.faq-q .pm{ flex:none; width:26px; height:26px; border:1px solid var(--line); border-radius:7px; display:flex; align-items:center; justify-content:center; color:var(--green); transition:.3s var(--ease); position:relative; }\n.faq-q .pm::before, .faq-q .pm::after{ content:\"\"; position:absolute; background:var(--green); border-radius:2px; }\n.faq-q .pm::before{ width:11px; height:2px; }\n.faq-q .pm::after{ width:2px; height:11px; transition:.3s var(--ease); }\n.faq-item.open .pm{ background:oklch(0.84 0.19 150 / 0.12); }\n.faq-item.open .pm::after{ transform:scaleY(0); }\n.faq-a{ max-height:0; overflow:hidden; transition:max-height .4s var(--ease); }\n.faq-a-inner{ padding:0 0 24px; color:var(--text-mut); font-size:1rem; line-height:1.62; max-width:72ch; }\n\n/* marquee */\n.marquee{ overflow:hidden; -webkit-mask-image:linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent); mask-image:linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent); }\n.marquee-track{ display:flex; gap:64px; width:max-content; animation:scrollX 34s linear infinite; }\n.marquee:hover .marquee-track{ animation-play-state:paused; }\n@keyframes scrollX{ to{ transform:translateX(-50%); } }\n.mq-item{ font-family:var(--font-display); font-size:1.5rem; font-weight:500; color:var(--text-dim); white-space:nowrap; display:flex; align-items:center; gap:12px; }\n\n/* glow blob */\n.glow{ position:absolute; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; }\n\n/* CTA band */\n.cta-band{ position:relative; border:1px solid var(--line); border-radius:24px; padding:72px 48px; text-align:center; overflow:hidden; background:linear-gradient(180deg, var(--bg-2), var(--surface)); }\n.cta-band .glow{ width:520px; height:300px; background:var(--green-glow); top:-120px; left:50%; transform:translateX(-50%); }\n\n/* generic grids */\n.grid-2{ display:grid; grid-template-columns:repeat(2,1fr); gap:22px; }\n.grid-3{ display:grid; grid-template-columns:repeat(3,1fr); gap:22px; }\n.grid-4{ display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }\n\n/* image placeholder (drop real product shots / gifs here) */\n.ph{\n  position:relative; border:1px solid var(--line); border-radius:var(--radius);\n  background:\n    repeating-linear-gradient(135deg, oklch(0.22 0.016 158) 0 10px, oklch(0.19 0.014 158) 10px 20px);\n  display:flex; align-items:center; justify-content:center;\n  color:var(--text-dim); font-family:var(--font-mono); font-size:0.8rem; letter-spacing:0.04em;\n  text-align:center; padding:20px; min-height:200px;\n}\n\n/* ----------------------------------------------------------\n   HERO (home)\n   ---------------------------------------------------------- */\n.hero{ position:relative; padding:168px 0 96px; overflow:hidden; }\n#hero-canvas{ position:absolute; inset:0; z-index:0; }\n.hero::after{ /* fade canvas at edges */\n  content:\"\"; position:absolute; inset:0; z-index:0; pointer-events:none;\n  background:radial-gradient(ellipse 78% 70% at 50% 42%, transparent 58%, var(--bg) 100%);\n}\n.hero-inner{ position:relative; z-index:2; max-width:880px; }\n.hero .display{ max-width:15ch; margin:18px 0 24px; }\n.hero .lead{ max-width:56ch; }\n.hero-cta{ display:flex; gap:14px; margin-top:36px; flex-wrap:wrap; }\n.hero-meta{ display:flex; gap:26px; flex-wrap:wrap; margin-top:38px; font-family:var(--font-mono); font-size:0.82rem; color:var(--text-mut); }\n.hero-meta span{ display:inline-flex; align-items:center; gap:9px; }\n.live-dot{ width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 10px var(--green); display:inline-block; animation:pulseDot 1.8s var(--ease) infinite; }\n\n.mq-cap{ font-family:var(--font-mono); font-size:0.8rem; letter-spacing:0.08em; color:var(--text-dim); text-transform:uppercase; margin-bottom:30px; }\n\n/* ----------------------------------------------------------\n   PROBLEM / STATS\n   ---------------------------------------------------------- */\n.prob-head{ max-width:60ch; margin-bottom:52px; }\n.prob-head .h2{ margin:14px 0 16px; }\n.stat-band{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line-soft); border:1px solid var(--line-soft); border-radius:var(--radius); overflow:hidden; }\n.stat-cell{ background:var(--surface); padding:38px 30px; }\n.stat-foot{ font-family:var(--font-mono); font-size:0.78rem; margin-top:18px; }\n\n/* ----------------------------------------------------------\n   STEPS\n   ---------------------------------------------------------- */\n.steps{ display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-top:52px; }\n.step{ position:relative; }\n.step-no{ position:absolute; top:24px; right:26px; font-family:var(--font-mono); font-size:0.82rem; color:var(--text-dim); }\n\n/* ----------------------------------------------------------\n   DETECTION GRID\n   ---------------------------------------------------------- */\n.det-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:48px; }\n\n/* ----------------------------------------------------------\n   COMMAND CENTER\n   ---------------------------------------------------------- */\n.cc-grid{ display:grid; grid-template-columns:1fr 1.12fr; gap:54px; align-items:center; }\n.cc-copy .h2{ margin:14px 0 18px; }\n.cc-list{ list-style:none; margin-top:26px; }\n\n.cc-panel{ background:var(--bg-2); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:0 40px 90px -40px rgba(0,0,0,0.7); }\n.cc-bar{ display:flex; align-items:center; justify-content:space-between; padding:13px 18px; border-bottom:1px solid var(--line-soft); background:var(--surface); font-family:var(--font-mono); font-size:0.8rem; }\n.cc-live{ display:inline-flex; align-items:center; gap:9px; color:var(--green); }\n.cc-time{ color:var(--text-mut); }\n.cc-body{ display:grid; grid-template-columns:1.15fr 1fr; gap:0; }\n.cc-video{ position:relative; padding:18px; border-right:1px solid var(--line-soft); }\n.cc-score{ position:absolute; bottom:30px; right:30px; }\n.ring{\n  width:92px; height:92px; border-radius:50%;\n  display:flex; flex-direction:column; align-items:center; justify-content:center;\n  background:conic-gradient(var(--green) 0turn 0.82turn, oklch(0.30 0.02 158) 0.82turn 1turn);\n  position:relative;\n}\n.ring::before{ content:\"\"; position:absolute; inset:7px; border-radius:50%; background:var(--bg-2); }\n.ring-val{ position:relative; font-family:var(--font-display); font-weight:600; font-size:1.7rem; color:var(--green); line-height:1; }\n.ring-lbl{ position:relative; font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-mut); margin-top:3px; }\n.cc-feed{ padding:18px 20px; }\n.cc-feed-h{ font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); margin-bottom:14px; }\n.cc-row{ display:flex; align-items:center; gap:11px; padding:9px 0; font-size:0.84rem; color:var(--text-mut); border-bottom:1px solid var(--line-soft); }\n.cc-row:last-child{ border-bottom:0; }\n.cc-t{ font-family:var(--font-mono); font-size:0.72rem; color:var(--text-dim); flex:none; width:38px; }\n.cc-dot{ width:7px; height:7px; border-radius:50%; flex:none; }\n.cc-row.ok .cc-dot{ background:var(--green); box-shadow:0 0 8px var(--green); }\n.cc-row.warn .cc-dot{ background:var(--amber); box-shadow:0 0 8px var(--amber); }\n.cc-row.flag .cc-dot{ background:var(--flag); box-shadow:0 0 8px var(--flag); animation:pulseDot 1.2s infinite; }\n.cc-row.flag .cc-msg{ color:var(--flag); }\n\n/* ----------------------------------------------------------\n   COMPARISON TABLE\n   ---------------------------------------------------------- */\n.cmp{ margin-top:48px; border:1px solid var(--line-soft); border-radius:var(--radius); overflow:hidden; }\n.cmp-head, .cmp-row{ display:grid; grid-template-columns:1.7fr 1fr 1fr; }\n.cmp-head{ background:var(--surface); border-bottom:1px solid var(--line); }\n.cmp-cell{ padding:18px 22px; display:flex; align-items:center; }\n.cmp-head .cmp-cell{ font-family:var(--font-mono); font-size:0.78rem; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-mut); }\n.cmp-head .cmp-new{ color:var(--green); }\n.cmp-row{ border-bottom:1px solid var(--line-soft); }\n.cmp-row:last-child{ border-bottom:0; }\n.cmp-row:nth-child(even){ background:oklch(0.18 0.014 158 / 0.4); }\n.cmp-feat{ color:var(--text); font-size:0.96rem; }\n.cmp-new{ background:oklch(0.84 0.19 150 / 0.04); }\n.cmp .x{ color:var(--text-dim); font-family:var(--font-mono); font-size:0.86rem; }\n.cmp .y{ color:var(--green); font-family:var(--font-mono); font-size:0.86rem; font-weight:600; display:inline-flex; align-items:center; gap:7px; }\n.cmp .y::before{ content:\"\"; width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); }\n\n.faq-wrap{ max-width:840px; }\n.faq{ margin-top:36px; }\n\n/* ----------------------------------------------------------\n   INTERIOR PAGE COMPONENTS\n   ---------------------------------------------------------- */\n/* alternating feature rows */\n.feat-row{ display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center; padding:46px 0; }\n.feat-row.flip .feat-media{ order:-1; }\n.feat-row .h3{ margin:14px 0 14px; font-size:clamp(1.5rem,2.4vw,2rem); }\n.feat-media .ph{ min-height:300px; }\n.feat-list{ list-style:none; margin-top:20px; }\n\n/* big numbered timeline */\n.tl{ position:relative; margin-top:56px; }\n.tl-item{ display:grid; grid-template-columns:130px 1fr; gap:36px; padding:34px 0; border-top:1px solid var(--line-soft); }\n.tl-item:last-child{ border-bottom:1px solid var(--line-soft); }\n.tl-no{ font-family:var(--font-display); font-weight:600; font-size:clamp(2.4rem,5vw,3.6rem); color:var(--green-deep); line-height:1; letter-spacing:-0.03em; }\n.tl-body h3{ font-size:1.4rem; margin-bottom:12px; }\n.tl-body p{ color:var(--text-mut); max-width:62ch; }\n\n/* callout */\n.callout{ border:1px solid var(--line); border-left:3px solid var(--green); border-radius:12px; background:var(--surface); padding:26px 30px; }\n.callout p{ color:var(--text-mut); }\n\n/* pricing */\n.price-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:22px; margin-top:52px; align-items:start; }\n.price-card{ background:var(--surface); border:1px solid var(--line-soft); border-radius:var(--radius); padding:34px 30px; position:relative; transition:border-color .3s var(--ease), transform .3s var(--ease); }\n.price-card:hover{ transform:translateY(-4px); }\n.price-card.featured{ border-color:var(--green); background:linear-gradient(180deg, oklch(0.84 0.19 150 / 0.05), var(--surface)); }\n.price-badge{ position:absolute; top:-12px; left:30px; font-family:var(--font-mono); font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; background:var(--green); color:#06140c; padding:5px 12px; border-radius:999px; font-weight:600; }\n.price-name{ font-family:var(--font-mono); font-size:0.82rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-mut); }\n.price-amt{ font-family:var(--font-display); font-weight:600; font-size:2.8rem; letter-spacing:-0.03em; margin:14px 0 4px; }\n.price-amt small{ font-size:0.95rem; color:var(--text-dim); font-weight:400; font-family:var(--font-body); }\n.price-desc{ color:var(--text-mut); font-size:0.95rem; min-height:46px; margin-bottom:22px; }\n.price-card .checkrow{ font-size:0. d:var(--bg); border:1px solid var(--line); border-radius:9px;\n  padding:13px 15px; color:var(--text); font-family:var(--font-body); font-size:1rem;\n  transition:border-color .2s;\n}\n.field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--green); }\n.field input::placeholder, .field textarea::placeholder{ color:var(--text-dim); }\n.form-note{ font-size:0.86rem; color:var(--text-mut); margin-top:14px; min-height:20px; }\n\n/* two-col with sticky aside */\n.split{ display:grid; grid-template-columns:1fr 460px; gap:56px; align-items:start; }\n\n/* trust badges */\n.badges{ display:flex; flex-wrap:wrap; gap:14px; margin-top:30px; }\n.badge{ display:inline-flex; align-items:center; gap:9px; border:1px solid var(--line); border-radius:10px; padding:11px 16px; font-family:var(--font-mono); font-size:0.8rem; color:var(--text-mut); }\n.badge svg{ width:16px; height:16px; color:var(--green); }\n\n/* mini stat inline */\n.inline-stats{ display:flex; gap:46px; flex-wrap:wrap; margin-top:36px; }\n.inline-stats .stat-num{ font-size:clamp(2rem,3vw,2.6rem); }\n\n/* ----------------------------------------------------------\n   Responsive\n   ---------------------------------------------------------- */\n@media (max-width:1000px){\n  .foot-grid{ grid-template-columns:1fr 1fr; gap:34px; }\n  .grid-4{ grid-template-columns:repeat(2,1fr); }\n  .steps{ grid-template-columns:repeat(2,1fr); }\n  .det-grid{ grid-template-columns:repeat(2,1fr); }\n  .cc-grid{ grid-template-columns:1fr; gap:40px; }\n}\n@media (max-width:820px){\n  .section{ padding:76px 0; }\n  .wrap{ padding:0 22px; }\n  .hero{ padding:128px 0 70px; }\n  .stat-band{ grid-template-columns:1fr; }\n  .steps{ grid-template-columns:1fr; }\n  .det-grid{ grid-template-columns:1fr; }\n  .cc-body{ grid-template-columns:1fr; }\n  .cc-video{ border-right:0; border-bottom:1px solid var(--line-soft); }\n  .cmp-head, .cmp-row{ grid-template-columns:1.4fr 0.8fr 0.8fr; }\n  .cmp-cell{ padding:14px \"Web\",\n      \"description\": \"Trueyy monitors live remote interviews and flags AI tool use, app switching, clipboard activity, and reading behavior in real time.\",\n      \"offers\": { \"@type\": \"Offer\", \"price\": \"0\", \"priceCurrency\": \"USD\", \"description\": \"Early access\" },\n      \"publisher\": { \"@id\": \"https://trueyy.com/#org\" }\n    },\n    {\n      \"@type\": \"FAQPage\",\n      \"mainEntity\": [\n        { \"@type\": \"Question\", \"name\": \"How does Trueyy detect cheating during an interview?\", \"acceptedAnswer\": { \"@type\": \"Answer\", \"text\": \"Trueyy runs quietly alongside the live call and watches device-level signals such as app and window switching, clipboard activity, AI assistant usage, and reading patterns. It scores each moment and surfaces a clear timeline to the interviewer.\" } },\n        { \"@type\": \"Question\", \"name\": \"Does the candidate need to install anything?\", \"acceptedAnswer\": { \"@type\": \"Answer\", \"text\": \"Candidates join through a lightweight browser session. There is nothing heavy to download, and the interviewer sees integrity signals on their own dashboard.\" } },\n        { \"@type\": \"Question\", \"name\": \"Which video platforms does Trueyy work with?\", \"acceptedAnswer\": { \"@type\": \"Answer\", \"text\": \"Trueyy is built to sit beside the calls you already run on Zoom, Google Meet, and Microsoft Teams.\" } },\n        { \"@type\": \"Question\", \"name\": \"Is Trueyy compliant with privacy regulations?\", \"acceptedAnswer\": { \"@type\": \"Answer\", \"text\": \"Trueyy is built privacy-first with encryption in transit and at rest, consent prompts, and retention controls designed to support GDPR and SOC 2 requirements.\" } }\n      ]\n    }\n  ]\n}\n<\u002Fscript>\n\n<\u002Fhead>\n<body>\n\n<!-- ===== HEADER ===== -->\n<header class=\"site-header\">\n  <div class=\"wrap nav\">\n    <a class=\"brand\" href=\"index.html\"><span class=\"dot\"><\u002Fspan>Trueyy<\u002Fa>\n    <nav class=\"nav-links\" aria-label=\"Primary\">\n      <a href=\"features.html\">Product<\u002Fa>\n      <a href=\"how-it-works.html\">How it works<\u002Fa>\n      <a href=\"security.html\">Security<\u002Fa>\n      <a href=\"comparison.html\">Compare<\u002Fa>\n      <a href=\"pricing.html\">Pricing<\u002Fa>\n      <a href=\"resources.html\">Resources<\u002Fa>\n      <a class=\"btn btn--primary nav-cta-mobile\" href=\"demo.html\">Book a demo<\u002Fa>\n    <\u002Fnav>\n    <div class=\"nav-right\">\n      <a class=\"btn btn--primary nav-cta-desktop\" href=\"demo.html\">Book a demo <span class=\"arw\">→<\u002Fspan><\u002Fa>\n      <button class=\"nav-toggle\" aria-label=\"Toggle menu\"><span><\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main>\n\n<!-- ===== HERO ===== -->\n<section class=\"hero\">\n  <div id=\"hero-canvas\" aria-hidden=\"true\"><\u002Fdiv>\n  <div class=\"wrap hero-inner\">\n    <span class=\"kicker reveal\">Live interview integrity<\u002Fspan>\n    <h1 class=\"display reveal\" data-d=\"1\">Catch what the <span class=\"tx-green\">interview<\u002Fspan> can't show you<\u002Fh1>\n    <p class=\"lead reveal\" data-d=\"2\">Remote candidates can read from a second screen, run an AI assistant off camera, or paste answers in seconds. Trueyy watches the signals you miss and gives your interviewers a clear, honest read on every conversation.<\u002Fp>\n    <div class=\"hero-cta reveal\" data-d=\"3\">\n      <a class=\"btn btn--primary btn--lg\" href=\"demo.html\">Book a demo <span class=\"arw\">→<\u002Fspan><\u002Fa>\n      <a class=\"btn btn--ghost btn--lg\" href=\"how-it-works.html\">See how it works<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"hero-meta reveal\" data-d=\"4\">\n      <span><i class=\"live-dot\"><\u002Fi> Works inside Zoom, Meet &amp; Teams<\u002Fspan>\n      <span>No clunky candidate install<\u002Fspan>\n      <span>Privacy-first by design<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== LOGO MARQUEE ===== -->\n<section class=\"section--tight\">\n  <div class=\"wrap center\">\n    <p class=\"mq-cap\">Sits beside the tools your team already runs interviews on<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"marquee\" aria-hidden=\"true\">\n    <div class=\"marquee-track\">\n      <span class=\"mq-item\">Zoom<\u002Fspan><span class=\"mq-item\">Google Meet<\u002Fspan><span class=\"mq-item\">Microsoft Teams<\u002Fspan>\n      <span class=\"mq-item\">Greenhouse<\u002Fspan><span class=\"mq-item\">Lever<\u002Fspan><span class=\"mq-item\">Workday<\u002Fspan>\n      <span class=\"mq-item\">Zoom<\u002Fspan><span class=\"mq-item\">Google Meet<\u002Fspan><span class=\"mq-item\">Microsoft Teams<\u002Fspan>\n      <span class=\"mq-item\">Greenhouse<\u002Fspan><span class=\"mq-item\">Lever<\u002Fspan><span class=\"mq-item\">Workday<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== PROBLEM / STATS ===== -->\n<section class=\"section\">\n  <div class=\"wrap\">\n    <div class=\"prob-head reveal\">\n      <span class=\"kicker\">The trust gap<\u002Fspan>\n      <h2 class=\"h2\">Remote interviews got easier to fake<\u002Fh2>\n      <p class=\"lead\">A polished answer no longer proves much. The hard part is no longer running the interview, it is knowing whether the person on the call actually did the thinking. That gap costs teams real money and real time.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"stat-band reveal\" data-d=\"1\">\n      <div class=\"stat-cell\">\n        <div class=\"stat-num\" data-count=\"67\" data-suffix=\"%\">0%<\u002Fdiv>\n        <p class=\"stat-lbl\">of recruiters say they have caught a candidate using outside help during a remote interview.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"stat-cell\">\n        <div class=\"stat-num\" data-count=\"3\" data-suffix=\"x\">0x<\u002Fdiv>\n        <p class=\"stat-lbl\">jump in suspected AI-assisted answers reported across remote hiring since 2023.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"stat-cell\">\n        <div class=\"stat-num\" data-count=\"89\" data-suffix=\"%\">0%<\u002Fdiv>\n        <p class=\"stat-lbl\">of hiring teams want a clear integrity signal before they extend an offer.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"stat-foot dim\">Directional figures drawn from public remote-hiring research. Swap in your own numbers once Trueyy is live in your pipeline.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== HOW IT WORKS ===== -->\n<section class=\"section\" id=\"how\">\n  <div class=\"wrap\">\n    <div class=\"center reveal\">\n      <span class=\"kicker kicker--center\">How it works<\u002Fspan>\n      <h2 class=\"h2\">Four steps, zero friction for your interviewers<\u002Fh2>\n      <p class=\"lead\" style=\"margin:14px auto 0;\">Trueyy slots into the way you already hire. Set it up once, then let it run in the background of every call.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"steps\">\n      <div class=\"step card reveal\" data-d=\"1\">\n        <span class=\"step-no\">01<\u002Fspan>\n        <div class=\"card-ico\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"17\" rx=\"2\"><\u002Frect><path d=\"M16 2v4M8 2v4M3 10h18\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Schedule<\u002Fh3>\n        <p>Drop a Trueyy link into the calendar invite. Nothing changes about how your team books the interview.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step card reveal\" data-d=\"2\">\n        <span class=\"step-no\">02<\u002Fspan>\n        <div class=\"card-ico\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M15 10l4.5-2.5v9L15 14\"><\u002Fpath><rect x=\"3\" y=\"6\" width=\"12\" height=\"12\" rx=\"2\"><\u002Frect><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Connect<\u002Fh3>\n        <p>The candidate joins through the browser. Consent is clear and the session opens right beside your video call.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step card reveal\" data-d=\"3\">\n        <span class=\"step-no\">03<\u002Fspan>\n        <div class=\"card-ico\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Monitor<\u002Fh3>\n        <p>Trueyy reads device-level signals as the conversation happens and quietly scores the moments that matter.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step card reveal\" data-d=\"4\">\n        <span class=\"step-no\">04<\u002Fspan>\n        <div class=\"card-ico\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M4 20V10M10 20V4M16 20v-7M22 20H2\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Review<\u002Fh3>\n        <p>Every session ends with a plain-language timeline and an integrity score you can attach to the scorecard.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"center\" style=\"margin-top:34px;\">\n      <a class=\"btn btn--ghost\" href=\"how-it-works.html\">Walk through the full flow <span class=\"arw\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== DETECTION GRID ===== -->\n<section class=\"section\" id=\"detection\">\n  <div class=\"wrap\">\n    <div class=\"reveal\" style=\"max-width:62ch;\">\n      <span class=\"kicker\">Multi-signal detection<\u002Fspan>\n      <h2 class=\"h2\">One signal can lie. Together they don't.<\u002Fh2>\n      <p class=\"lead\">No single tell proves a candidate is cheating. Trueyy reads several signals at once and weighs them against each other, so an honest pause never looks the same as a hidden assistant feeding answers.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"det-grid\">\n      <article class=\"card reveal\" data-d=\"1\">\n        <div class=\"card-ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M12 2a4 4 0 0 1 4 4v4a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z\"><\u002Fpath><path d=\"M5 10a7 7 0 0 0 14 0M12 17v4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>AI assistant use<\u002Fh3>\n        <p>Spots the rhythm of answers piped in from an AI tool, including the tell-tale lag between a question and a suspiciously complete reply.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"card reveal\" data-d=\"2\">\n        <div class=\"card-ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M8 21h8M12 18v3M7 9l3 3-3 3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>App &amp; window switching<\u002Fh3>\n        <p>Notices when focus leaves the interview for another app or a hidden window mid-answer, and logs exactly when it happened.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"card reveal\" data-d=\"3\">\n        <div class=\"card-ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"8\" y=\"2\" width=\"8\" height=\"4\" rx=\"1\"><\u002Frect><path d=\"M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Clipboard activity<\u002Fh3>\n        <p>Catches large pastes that arrive faster than anyone could type, a common sign of pre-written or generated answers.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"card reveal\" data-d=\"4\">\n        <div class=\"card-ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Reading behavior<\u002Fh3>\n        <p>Reads gaze and timing patterns that suggest a candidate is reading from a script or a second screen instead of speaking freely.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"card reveal\" data-d=\"1\">\n        <div class=\"card-ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M12 3v18M5 8l7-5 7 5M5 8v8l7 5 7-5V8\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Second-device signals<\u002Fh3>\n        <p>Surfaces patterns that point to a phone or extra monitor just out of frame, where help is most often hiding.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"card reveal\" data-d=\"2\">\n        <div class=\"card-ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M3 12h4l3 8 4-16 3 8h4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Answer cadence<\u002Fh3>\n        <p>Models how a person naturally builds an answer, so unnatural fluency and perfect structure stand out instead of slipping by.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n    <div class=\"center\" style=\"margin-top:34px;\">\n      <a class=\"btn btn--ghost\" href=\"features.html\">Explore every detection layer <span class=\"arw\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== COMMAND CENTER DEMO ===== -->\n<section class=\"section\" id=\"command\">\n  <div class=\"wrap\">\n    <div class=\"cc-grid\">\n      <div class=\"cc-copy reveal\">\n        <span class=\"kicker\">Your command center<\u002Fspan>\n        <h2 class=\"h2\">See the read while the interview is still happening<\u002Fh2>\n        <p class=\"lead\">Trueyy turns raw signals into something your interviewer can actually use in the moment. A calm live feed, a single integrity score, and a timeline they can scrub through after the call. No guesswork, no gut feeling.<\u002Fp>\n        <ul class=\"cc-list\">\n          <li class=\"checkrow\"><span class=\"ck\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M5 12l4 4L19 6\"><\u002Fpath><\u002Fsvg><\u002Fspan><span>A live integrity score that updates as the conversation moves.<\u002Fspan><\u002Fli>\n          <li class=\"checkrow\"><span class=\"ck\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M5 12l4 4L19 6\"><\u002Fpath><\u002Fsvg><\u002Fspan><span>Time-stamped flags you can jump straight to afterward.<\u002Fspan><\u002Fli>\n          <li class=\"checkrow\"><span class=\"ck\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M5 12l4 4L19 6\"><\u002Fpath><\u002Fsvg><\u002Fspan><span>A shareable summary that drops onto the candidate scorecard.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <!-- animated mock panel -->\n      <div class=\"cc-panel reveal\" data-d=\"1\" role=\"img\" aria-label=\"Trueyy live monitoring dashboard showing an integrity score and a feed of detected signals\">\n        <div class=\"cc-bar\">\n          <span class=\"cc-live\"><i class=\"live-dot\"><\u002Fi> Live session<\u002Fspan>\n          <span class=\"cc-time\" data-clock=\"\">00:14:22<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"cc-body\">\n          <div class=\"cc-video\">\n            <div class=\"ph\" style=\"min-height:0;aspect-ratio:16/10;\">candidate video tile<\u002Fdiv>\n            <div class=\"cc-score\">\n              <div class=\"ring\" data-ring=\"\">\n                <span class=\"ring-val\">82<\u002Fspan>\n                <span class=\"ring-lbl\">integrity<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cc-feed\">\n            <p class=\"cc-feed-h\">Signal feed<\u002Fp>\n            <div class=\"cc-row ok\"><span class=\"cc-t\">12:02<\u002Fspan><span class=\"cc-dot\"><\u002Fspan><span class=\"cc-msg\">Steady eye contact, natural pacing<\u002Fspan><\u002Fdiv>\n            <div class=\"cc-row warn\"><span class=\"cc-t\">12:31<\u002Fspan><span class=\"cc-dot\"><\u002Fspan><span class=\"cc-msg\">Brief window switch detected<\u002Fspan><\u002Fdiv>\n            <div class=\"cc-row ok\"><span class=\"cc-t\">13:08<\u002Fspan><span class=\"cc-dot\"><\u002Fspan><span class=\"cc-msg\">Answer cadence within range<\u002Fspan><\u002Fdiv>\n            <div class=\"cc-row flag\"><span class=\"cc-t\">13:44<\u002Fspan><span class=\"cc-dot\"><\u002Fspan><span class=\"cc-msg\">Large clipboard paste flagged<\u002Fspan><\u002Fdiv>\n            <div class=\"cc-row ok\"><span class=\"cc-t\">14:10<\u002Fspan><span class=\"cc-dot\"><\u002Fspan><span class=\"cc-msg\">Back on camera, no second screen<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== COMPARISON ===== -->\n<section class=\"section\" id=\"why\">\n  <div class=\"wrap\">\n    <div class=\"center reveal\">\n      <span class=\"kicker kicker--center\">Why Trueyy<\u002Fspan>\n      <h2 class=\"h2\">Built for live interviews, not locked-down exams<\u002Fh2>\n      <p class=\"lead\" style=\"margin:14px auto 0;\">Old-school proctoring was made for timed tests. It locks browsers and watches faces. Live hiring conversations need something that reads intent, not just movement.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"cmp reveal\" data-d=\"1\">\n      <div class=\"cmp-head\">\n        <div class=\"cmp-cell cmp-feat\">Capability<\u002Fdiv>\n        <div class=\"cmp-cell cmp-old\">Traditional proctoring<\u002Fdiv>\n        <div class=\"cmp-cell cmp-new\">Trueyy<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cmp-rows\">\n        <div class=\"cmp-row\"><div class=\"cmp-cell cmp-feat\">Runs during a live two-way interview<\u002Fdiv><div class=\"cmp-cell cmp-old\"><span class=\"x\">No<\u002Fspan><\u002Fdiv><div class=\"cmp-cell cmp-new\"><span class=\"y\">Yes<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"cmp-row\"><div class=\"cmp-cell cmp-feat\">Detects AI assistant use in real time<\u002Fdiv><div class=\"cmp-cell cmp-old\"><span class=\"x\">Limited<\u002Fspan><\u002Fdiv><div class=\"cmp-cell cmp-new\"><span class=\"y\">Yes<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"cmp-row\"><div class=\"cmp-cell cmp-feat\">Works inside Zoom, Meet and Teams<\u002Fdiv><div class=\"cmp-cell cmp-old\"><span class=\"x\">No<\u002Fspan><\u002Fdiv><div class=\"cmp-cell cmp-new\"><span class=\"y\">Yes<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"cmp-row\"><div class=\"cmp-cell cmp-feat\">Weighs several signals together<\u002Fdiv><div class=\"cmp-cell cmp-old\"><span class=\"x\">Rule-based<\u002Fspan><\u002Fdiv><div class=\"cmp-cell cmp-new\"><span class=\"y\">Yes<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"cmp-row\"><div class=\"cmp-cell cmp-feat\">Light footprint for the candidate<\u002Fdiv><div class=\"cmp-cell cmp-old\"><span class=\"x\">Heavy<\u002Fspan><\u002Fdiv><div class=\"cmp-cell cmp-new\"><span class=\"y\">Yes<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"cmp-row\"><div class=\"cmp-cell cmp-feat\">Plain-language timeline after the call<\u002Fdiv><div class=\"cmp-cell cmp-old\"><span class=\"x\">No<\u002Fspan><\u002Fdiv><div class=\"cmp-cell cmp-new\"><span class=\"y\">Yes<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"center\" style=\"margin-top:28px;\">\n      <a class=\"btn btn--ghost\" href=\"comparison.html\">See the full comparison <span class=\"arw\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SECURITY ===== -->\n<section class=\"section\" id=\"security\">\n  <div class=\"wrap\">\n    <div class=\"center reveal\">\n      <span class=\"kicker kicker--center\">Security &amp; privacy<\u002Fspan>\n      <h2 class=\"h2\">Honest monitoring, handled with care<\u002Fh2>\n      <p class=\"lead\" style=\"margin:14px auto 0;\">Watching for cheating should never mean treating candidates badly. Trueyy is built to be transparent with people and strict with their data.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"grid-3\" style=\"margin-top:48px;\">\n      <div class=\"card reveal\" data-d=\"1\">\n        <div class=\"card-ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z\"><\u002Fpath><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Transparent by default<\u002Fh3>\n        <p>Candidates are told what is being monitored before the interview starts. No hidden tracking, no surprises.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card reveal\" data-d=\"2\">\n        <div class=\"card-ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"4\" y=\"10\" width=\"16\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M8 10V7a4 4 0 0 1 8 0v3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Encrypted end to end<\u002Fh3>\n        <p>Session data is encrypted in transit and at rest. You control how long it lives and who on your team can see it.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card reveal\" data-d=\"3\">\n        <div class=\"card-ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M9 11l3 3L22 4\"><\u002Fpath><path d=\"M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Compliance ready<\u002Fh3>\n        <p>Built around GDPR and SOC 2 expectations, with consent flows and retention controls baked in from the start.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"center\" style=\"margin-top:34px;\">\n      <a class=\"btn btn--ghost\" href=\"security.html\">Read our security approach <span class=\"arw\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== FAQ ===== -->\n<section class=\"section\" id=\"faq\">\n  <div class=\"wrap faq-wrap\">\n    <div class=\"reveal\">\n      <span class=\"kicker\">Questions, answered<\u002Fspan>\n      <h2 class=\"h2\">What teams ask before they switch<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"faq reveal\" data-d=\"1\">\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">How does Trueyy detect cheating during an interview?<span class=\"pm\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">Trueyy runs quietly beside the live call and reads device-level signals like app and window switching, clipboard activity, AI assistant patterns, and reading behavior. It weighs them together, scores each moment, and shows your interviewer a clear timeline rather than a single noisy alert.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">Does the candidate need to install anything heavy?<span class=\"pm\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">No. Candidates join through a lightweight browser session with clear consent. The interviewer sees the integrity signals on their own dashboard, so the candidate experience stays simple.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">Which video platforms does it work with?<span class=\"pm\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">Trueyy is built to sit beside the calls you already run on Zoom, Google Meet, and Microsoft Teams, so you do not have to move your interviews onto a new platform.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">Will candidates feel like they are being spied on?<span class=\"pm\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">They are told up front what is monitored and why. Trueyy is designed to confirm honest work, not to punish nerves. Most candidates appreciate a process that protects the people who are not cutting corners.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">Is Trueyy compliant with privacy regulations?<span class=\"pm\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">Yes. Trueyy is built privacy-first with encryption in transit and at rest, consent prompts, and retention controls designed to support GDPR and SOC 2 requirements.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">When can my team start using it?<span class=\"pm\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">Trueyy is rolling out to early-access teams now. Book a demo and we will get you set up, walk through a live session, and share early-access pricing.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== CTA BAND ===== -->\n<section class=\"section\">\n  <div class=\"wrap\">\n    <div class=\"cta-band reveal\">\n      <div class=\"glow\"><\u002Fdiv>\n      <span class=\"kicker kicker--center\">Trust your interviews again<\u002Fspan>\n      <h2 class=\"h2\" style=\"margin:14px 0 16px;\">Hire the person who actually did the work<\u002Fh2>\n      <p class=\"lead\" style=\"margin:0 auto 30px;\">See Trueyy read a live interview in real time. Book a short demo and we will show you exactly what you have been missing.<\u002Fp>\n      <div class=\"hero-cta\" style=\"justify-content:center;\">\n        <a class=\"btn btn--primary btn--lg\" href=\"demo.html\">Book a demo <span class=\"arw\">→<\u002Fspan><\u002Fa>\n        <a class=\"btn btn--ghost btn--lg\" href=\"pricing.html\">See early access<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<!-- ===== FOOTER ===== -->\n<footer class=\"site-footer\">\n  <div class=\"wrap\">\n    <div class=\"foot-grid\">\n      <div class=\"foot-brand\">\n        <a class=\"brand\" href=\"index.html\"><span class=\"dot\"><\u002Fspan>Trueyy<\u002Fa>\n        <p>Real-time interview integrity for remote hiring teams that care about a fair process.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"foot-col\">\n        <h4>Product<\u002Fh4>\n        <a href=\"features.html\">Detection<\u002Fa>\n        <a href=\"how-it-works.html\">How it works<\u002Fa>\n        <a href=\"comparison.html\">Compare<\u002Fa>\n        <a href=\"pricing.html\">Pricing<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"foot-col\">\n        <h4>Company<\u002Fh4>\n        <a href=\"resources.html\">Resources<\u002Fa>\n        <a href=\"security.html\">Security<\u002Fa>\n        <a href=\"demo.html\">Book a demo<\u002Fa>\n        <a href=\"demo.html\">Contact<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"foot-col\">\n        <h4>Legal<\u002Fh4>\n        <a href=\"security.html\">Privacy<\u002Fa>\n        <a href=\"security.html\">Terms<\u002Fa>\n        <a href=\"security.html\">Compliance<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bot\">\n      <span>© <span data-year=\"\">2026<\u002Fspan> Trueyy. All rights reserved.<\u002Fspan>\n      <span class=\"lights\"><i style=\"background:var(--flag)\"><\u002Fi><i style=\"background:var(--amber)\"><\u002Fi><i style=\"background:var(--green)\"><\u002Fi><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script src=\"95538271-446a-45b7-b36d-faa916121697\"><\u002Fscript>\n<script>\n/* Trueyy — p5.js \"live detection\" hero sketch\n   A calm field of interview-signal nodes. Most pulse green.\n   Periodically one is flagged (red) with an expanding detection ring,\n   echoing real-time integrity monitoring. */\n(function () {\n  if (typeof p5 === 'undefined') return;\n  var host = document.getElementById('hero-canvas');\n  if (!host) return;\n\n  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n  new p5(function (p) {\n    var W, H, nodes = [], flags = [], scan = 0, t = 0;\n    var GREEN, GREEN_DIM, FLAG, INK;\n    var NODE_COUNT;\n\n    function palette() {\n      GREEN = p.color(120, 240, 150);\n      GREEN_DIM = p.color(90, 180, 120, 60);\n      FLAG = p.color(255, 96, 78);\n      INK = p.color(150, 220, 175, 26);\n    }\n\n    function build() {\n      W = host.clientWidth; H = host.clientHeight;\n      NODE_COUNT = W < 700 ? 34 : 72;\n      nodes = [];\n      for (var i = 0; i < NODE_COUNT; i++) {\n        nodes.push({\n          x: p.random(W), y: p.random(H),\n          vx: p.random(-0.18, 0.18), vy: p.random(-0.18, 0.18),\n          r: p.random(1.4, 3.0),\n          ph: p.random(p.TWO_PI),\n          sp: p.random(0.6, 1.5)\n        });\n      }\n    }\n\n    p.setup = function () {\n      var c = p.createCanvas(host.clientWidth, host.clientHeight);\n      c.parent(host);\n      p.pixelDensity(Math.min(window.devicePixelRatio || 1, 2));\n      palette();\n      build();\n      if (reduce) p.noLoop();\n    };\n\n    p.windowResized = function () {\n      p.resizeCanvas(host.clientWidth, host.clientHeight);\n      build();\n    };\n\n    function spawnFlag() {\n      if (nodes.length === 0) return;\n      var n = nodes[(Math.random() * nodes.length) | 0];\n      flags.push({ x: n.x, y: n.y, life: 0, max: 150 });\n    }\n\n    p.draw = function () {\n      p.clear();\n      t += 0.01;\n\n      // connection lines between near nodes\n      p.strokeWeight(1);\n      for (var i = 0; i < nodes.length; i++) {\n        var a = nodes[i];\n        a.x += a.vx; a.y += a.vy;\n        if (a.x < 0 || a.x > W) a.vx *= -1;\n        if (a.y < 0 || a.y > H) a.vy *= -1;\n        for (var j = i + 1; j < nodes.length; j++) {\n          var b = nodes[j];\n          var dx = a.x - b.x, dy = a.y - b.y;\n          var d2 = dx * dx + dy * dy;\n          if (d2 < 21000) {\n            var al = p.map(d2, 0, 21000, 46, 0);\n            p.stroke(150, 220, 175, al);\n            p.line(a.x, a.y, b.x, b.y);\n          }\n        }\n      }\n\n      // nodes\n      p.noStroke();\n      for (var k = 0; k < nodes.length; k++) {\n        var nd = nodes[k];\n        var pulse = 0.6 + 0.4 * Math.sin(t * nd.sp * 2 + nd.ph);\n        p.fill(120, 240, 150, 60 + pulse * 95);\n        p.circle(nd.x, nd.y, nd.r * 2.1);\n        p.fill(120, 240, 150, 16);\n        p.circle(nd.x, nd.y, nd.r * 6.5 * pulse);\n      }\n\n      // detection flags\n      for (var f = flags.length - 1; f >= 0; f--) {\n        var fl = flags[f];\n        fl.life++;\n        var prog = fl.life / fl.max;\n        var ringR = prog * 70;\n        var a2 = (1 - prog) * 220;\n        p.noFill();\n        p.stroke(255, 96, 78, a2);\n        p.strokeWeight(1.6);\n        p.circle(fl.x, fl.y, ringR * 2);\n        p.stroke(255, 96, 78, a2 * 0.5);\n        p.circle(fl.x, fl.y, ringR * 1.3);\n        // core\n        p.noStroke();\n        p.fill(255, 96, 78, (1 - prog) * 255);\n        p.circle(fl.x, fl.y, 6);\n        if (fl.life >= fl.max) flags.splice(f, 1);\n      }\n\n      // periodic flag spawn\n      if (!reduce && p.frameCount % 110 === 0) spawnFlag();\n\n      // soft horizontal scan sweep\n      scan += 0.0016;\n      var sy = (Math.sin(scan) * 0.5 + 0.5) * H;\n      var grd = p.drawingContext.createLinearGradient(0, sy - 60, 0, sy + 60);\n      grd.addColorStop(0, 'rgba(120,240,150,0)');\n      grd.addColorStop(0.5, 'rgba(120,240,150,0.05)');\n      grd.addColorStop(1, 'rgba(120,240,150,0)');\n      p.drawingContext.fillStyle = grd;\n      p.drawingContext.fillRect(0, sy - 60, W, 120);\n    };\n  });\n})();\n\n<\u002Fscript>\n<script>\n/* Trueyy — shared interactions */\n(function () {\n  'use strict';\n\n  /* header scroll state */\n  var header = document.querySelector('.site-header');\n  function onScroll() {\n    if (!header) return;\n    if (window.scrollY > 12) header.classList.add('scrolled');\n    else header.classList.remove('scrolled');\n  }\n  window.addEventListener('scroll', onScroll, { passive: true });\n  onScroll();\n\n  /* mobile nav */\n  var toggle = document.querySelector('.nav-toggle');\n  if (toggle) {\n    toggle.addEventListener('click', function () {\n      document.body.classList.toggle('nav-open');\n    });\n    document.querySelectorAll('.nav-links a').forEach(function (a) {\n      a.addEventListener('click', function () { document.body.classList.remove('nav-open'); });\n    });\n  }\n\n  /* scroll reveal */\n  var reveals = document.querySelectorAll('.reveal');\n  if ('IntersectionObserver' in window && reveals.length) {\n    var io = new IntersectionObserver(function (entries) {\n      entries.forEach(function (e) {\n        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n    reveals.forEach(function (el) { io.observe(el); });\n  } else {\n    reveals.forEach(function (el) { el.classList.add('in'); });\n  }\n\n  /* count-up stats */\n  function animateCount(el) {\n    var target = parseFloat(el.getAttribute('data-count'));\n    var dec = (el.getAttribute('data-dec') || '0') | 0;\n    var suffix = el.getAttribute('data-suffix') || '';\n    var prefix = el.getAttribute('data-prefix') || '';\n    var dur = 1400, start = null;\n    function step(ts) {\n      if (!start) start = ts;\n      var p = Math.min((ts - start) / dur, 1);\n      var eased = 1 - Math.pow(1 - p, 3);\n      var val = (target * eased).toFixed(dec);\n      el.textContent = prefix + val + suffix;\n      if (p < 1) requestAnimationFrame(step);\n    }\n    requestAnimationFrame(step);\n  }\n  var counts = document.querySelectorAll('[data-count]');\n  if ('IntersectionObserver' in window && counts.length) {\n    var io2 = new IntersectionObserver(function (entries) {\n      entries.forEach(function (e) {\n        if (e.isIntersecting) { animateCount(e.target); io2.unobserve(e.target); }\n      });\n    }, { threshold: 0.6 });\n    counts.forEach(function (el) { io2.observe(el); });\n  }\n\n  /* FAQ accordion */\n  document.querySelectorAll('.faq-q').forEach(function (q) {\n    q.addEventListener('click', function () {\n      var item = q.closest('.faq-item');\n      var ans = item.querySelector('.faq-a');\n      var open = item.classList.contains('open');\n      if (open) {\n        item.classList.remove('open');\n        ans.style.maxHeight = null;\n      } else {\n        item.classList.add('open');\n        ans.style.maxHeight = ans.scrollHeight + 'px';\n      }\n    });\n  });\n\n  /* fake demo form */\n  document.querySelectorAll('[data-fakeform]').forEach(function (form) {\n    form.addEventListener('submit', function (e) {\n      e.preventDefault();\n      var btn = form.querySelector('button[type=\"submit\"]');\n      var note = form.querySelector('[data-formnote]');\n      if (btn) { btn.textContent = 'Request received'; btn.disabled = true; btn.style.opacity = '0.7'; }\n      if (note) { note.textContent = 'Thanks. The Trueyy team will reach out within one business day.'; note.style.color = 'var(--green)'; }\n    });\n  });\n\n  /* current year */\n  document.querySelectorAll('[data-year]').forEach(function (el) {\n    el.textContent = new Date().getFullYear();\n  });\n})();\n\n<\u002Fscript>\n<script>\n/* small live touches for the command-center mock */\n(function(){\n  var clock = document.querySelector('[data-clock]');\n  if(clock){\n    var s = 14*60+22;\n    setInterval(function(){ s++; var h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;\n      clock.textContent = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); },1000);\n  }\n})();\n<\u002Fscript>\n<script>\n/* preview: carry sandbox token across internal navigation */\n(function(){\n  var q = location.search;\n  if(!q) return;\n  document.querySelectorAll('a[href$=\".html\"]').forEach(function(a){\n    var href = a.getAttribute('href');\n    if(!href || /^(https?:|mailto:)/i.test(href) || href.indexOf('?')>-1) return;\n    a.setAttribute('href', href + q);\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
